display_information:
  name: CareBridge AI
  description: Conversational SDoH and HRSN screening assistant for healthcare clinics
  background_color: "#1e1e24"
features:
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: CareBridge AI
    always_online: true
  slash_commands:
    - command: /hrs-screen
      description: Start a Health-Related Social Needs patient screening (enforces DM privacy)
      should_escape: false
    - command: /hrs-dashboard
      description: Open the operational screening dashboard
      should_escape: false
  assistant_view:
    assistant_description: "Runs HRSN/SDoH screenings, flags health-related social needs, and generates plain-language summaries for referral routing."
    suggested_prompts:
      - title: "Start a new screening"
        message: "Start a new HRSN screening"
      - title: "Show today's summary"
        message: "Show today's screening summary"
oauth_config:
  scopes:
    bot:
      - commands
      - chat:write
      - im:write
      - im:history
      - app_mentions:read
      - assistant:write
      - channels:read
      - groups:read
settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.im
      - assistant_thread_started
      - assistant_thread_context_changed
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
